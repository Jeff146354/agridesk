server {
    listen 80;
    server_name drive.hq.idenx.id localhost;

    # Gzip compression for smaller payloads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Static React SPA — serve from build output
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* calls to the backend FastAPI container
    # This way the frontend never needs to know the backend hostname —
    # all requests are relative (/api/...) and nginx forwards them.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large file uploads (PDFs up to 20 MB)
        client_max_body_size 20m;

        # Timeouts for slow PDF generation
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
