server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the backend container.
    # The backend service name in docker-compose is "backend" and it listens on port 8000.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Serve static files; fall back to index.html for client-side routing (React Router).
    # Without this, refreshing any non-root route returns nginx 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
